<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Primary SEO -->
		<title>Sun Light — Solar Position Visualizer</title>
		<meta
			name="description"
			content="Free interactive tool to visualize the sun's elevation, azimuth and horizon path throughout the day for any location on Earth. Track sunrise, sunset and daylight."
		/>
		<link rel="canonical" href="https://sunlight.latrup.net/" />
		<meta name="robots" content="index, follow" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />

		<!-- Open Graph -->
		<meta property="og:title" content="Sun Light — Solar Position Visualizer" />
		<meta
			property="og:description"
			content="Free interactive tool to visualize the sun's elevation, azimuth and horizon path throughout the day for any location on Earth."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://sunlight.latrup.net/" />
		<meta property="og:image" content="https://sunlight.latrup.net/favicon.svg" />
		<meta property="og:site_name" content="Sun Light" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Sun Light — Solar Position Visualizer" />
		<meta
			name="twitter:description"
			content="Free interactive tool to visualize the sun's elevation, azimuth and horizon path throughout the day for any location on Earth."
		/>
		<meta name="twitter:image" content="https://sunlight.latrup.net/favicon.svg" />

		<!-- JSON-LD -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebApplication",
				"name": "Sun Light",
				"url": "https://sunlight.latrup.net/",
				"description": "Free interactive tool to visualize the sun's elevation, azimuth and horizon path throughout the day for any location on Earth.",
				"applicationCategory": "UtilitiesApplication",
				"operatingSystem": "Any",
				"offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
			}
		</script>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body class="bg-surface text-text font-sans antialiased" data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
